name: farmacia_monitor
description: Monitor de temperatura para Farmacia López
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # MQTT
  mqtt_client: ^10.2.1

  # Gráficos
  fl_chart: ^0.68.0

  # Notificaciones locales
  flutter_local_notifications: ^17.2.2

  # Almacenamiento local (historial)
  shared_preferences: ^2.2.3

  # Formato de fechas
  intl: ^0.19.0

  # Íconos extra
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
